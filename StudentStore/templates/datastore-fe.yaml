{{- with .Values.StudentStoreFrontend.studentFeDeploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-frontend
  namespace: {{ .namespace }}
  labels:
    type: frontend
spec:
  replicas: {{ .replicaCount }}
  selector:
    matchLabels:
      type: frontend
  template:
    metadata:
      name: datastore-frontend
      labels:
        type: frontend
    spec:
      containers:
        - name: mywebapp
          image: 8072388539/datastore-frontend:{{ .imgTag }}
          ports:
            - containerPort: 8080
          env:
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: datastore-fe-cm
                  key: backendEndpoint
          resources:
{{ toYaml .containerResources | indent 12 }}
          livenessProbe:
{{ toYaml .livenessProbe | indent 12 }}
          readinessProbe:
{{ toYaml .readinessProbe | indent 12 }}
          startupProbe:
{{ toYaml .startupProbe | indent 12 }}
{{- end }}

---

apiVersion: v1
kind: Service
metadata:
  name: datastore-frontend-svc
  namespace: {{ .Values.studentSvc.namespace }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.studentSvc.svcPort }}
      targetPort: 8080
  selector:
    type: frontend