StudentStoreBackend:
  StudentDeploy:
    image: v47.0
    replicaCount:1
    namespace: backend

    resources:
      requests:
       cpu: 100m
       memory: "500Mi"
      limits:
       cpu: "1"
       memory: "1Gi"
    livenessProbe:
      httpGet:
        path: /actuator/health
        port: 8084
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /actuator/health
        port: 8084
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startupProbe:
      httpGet:
        path: /actuator/health
        port: 8084
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10

StudentSvc:
    namespace: backend
    svcPort: 8081
    metricsAPI: /actuator/prometheus

